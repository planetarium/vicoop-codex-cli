name: version

# Changesets-driven version + release. Single source of truth for the automated
# release flow. On every push to `main`:
#
#   • Pending changesets exist → open/refresh the "Version Packages" PR (which
#     bumps package.json + writes CHANGELOG.md from the accumulated changesets).
#   • No pending changesets (i.e. the Version PR was just merged) → `changeset tag`
#     creates the `vX.Y.Z` git tag, changesets/action pushes it and creates the
#     GitHub Release using the CHANGELOG entry as the body. This job then
#     cross-compiles the four standalone binaries and attaches them to that release.
#
# The pushed git tag remains the released-version source of truth:
# `scripts/inject-version.mjs` stamps it into the sources at build time. Nothing
# here publishes to npm — Changesets is used purely for versioning + changelog.
#
# Manual binary rebuilds for an existing tag live in `release.yml` (workflow_dispatch).
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: version-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  version:
    name: Version PR / release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history + tags so `changeset tag` sees already-released tags as
          # existing and doesn't try to re-tag a name that already points elsewhere.
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: npm ci

      # When changesets are pending → creates/updates the Version Packages PR.
      # When none are pending (Version PR merged) → runs `changeset tag`, pushes
      # the tag, and creates the GitHub Release. `published` becomes 'true' only
      # in the latter case, which gates the binary build below.
      - name: Create Version PR or tag release
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run changeset:version
          publish: npm run changeset:tag
          commit: "chore: version packages"
          title: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- Everything below runs only when a release tag was just pushed. ----

      - name: Derive released version
        if: steps.changesets.outputs.published == 'true'
        id: version
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)*$ ]]; then
            echo "::error::package.json version '$VERSION' is not valid semver."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Prerelease iff there is a '-' suffix BEFORE any '+build' metadata
          # (semver: 1.2.3-rc.1 is a prerelease; 1.2.3+build-9 is not).
          if [[ "${VERSION%%+*}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Building binaries for $VERSION"

      - name: Inject version into sources
        if: steps.changesets.outputs.published == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: node scripts/inject-version.mjs "$VERSION"

      - name: Build (tsc)
        if: steps.changesets.outputs.published == 'true'
        run: npm run build

      - name: Compile standalone binaries
        if: steps.changesets.outputs.published == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release
          # Cross-compile each target (Bun) into a named release artifact.
          compile() {
            target="$1"; out="release/$2"
            echo "::group::compile $target -> $out"
            bun build ./bin/vicoop-codex.js --compile --target="$target" --outfile="$out"
            echo "::endgroup::"
          }
          compile bun-windows-x64  "vicoop-codex-${VERSION}-windows-x64.exe"
          compile bun-darwin-arm64 "vicoop-codex-${VERSION}-macos-arm64"
          compile bun-linux-x64    "vicoop-codex-${VERSION}-linux-x64"
          compile bun-linux-arm64  "vicoop-codex-${VERSION}-linux-arm64"
          ls -lh release

      - name: Generate checksums
        if: steps.changesets.outputs.published == 'true'
        working-directory: release
        run: |
          set -euo pipefail
          sha256sum vicoop-codex-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # The release object already exists (created by changesets/action above);
      # this attaches the binaries + checksums to it.
      - name: Attach binaries to the release
        if: steps.changesets.outputs.published == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
          files: |
            release/vicoop-codex-*
            release/SHA256SUMS.txt
