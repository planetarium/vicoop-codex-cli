name: release (manual rebuild)

# Manual fallback only. The normal release flow is Changesets-driven and lives in
# `version.yml`: merging a "Version Packages" PR pushes the `vX.Y.Z` tag, creates
# the GitHub Release, and builds/attaches the binaries automatically.
#
# Use THIS workflow to recover a release whose binaries failed to build or upload
# (or to (re)build binaries for a hand-pushed tag): it rebuilds the four standalone
# binaries for an existing tag and re-attaches them to that tag's GitHub Release.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)build binaries for, e.g. v0.8.2"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    name: Rebuild binaries for a tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Derive version from tag
        id: version
        env:
          REF_NAME: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)*$ ]]; then
            echo "::error::Tag '$REF_NAME' is not a valid semver tag (expected vX.Y.Z)."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Prerelease iff there is a '-' suffix BEFORE any '+build' metadata
          # (semver: 1.2.3-rc.1 is a prerelease; 1.2.3+build-9 is not).
          if [[ "${VERSION%%+*}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Rebuilding binaries for version $VERSION (tag $REF_NAME)"

      - name: Inject version into sources
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: node scripts/inject-version.mjs "$VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

      - name: Compile standalone binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release
          # Cross-compile each target (Bun) into a named release artifact.
          compile() {
            target="$1"; out="release/$2"
            echo "::group::compile $target -> $out"
            bun build ./bin/vicoop-codex.js --compile --target="$target" --outfile="$out"
            echo "::endgroup::"
          }
          compile bun-windows-x64  "vicoop-codex-${VERSION}-windows-x64.exe"
          compile bun-darwin-arm64 "vicoop-codex-${VERSION}-macos-arm64"
          compile bun-linux-x64    "vicoop-codex-${VERSION}-linux-x64"
          compile bun-linux-arm64  "vicoop-codex-${VERSION}-linux-arm64"
          ls -lh release

      - name: Generate checksums
        working-directory: release
        run: |
          set -euo pipefail
          sha256sum vicoop-codex-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: vicoop-codex ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
          files: |
            release/vicoop-codex-*
            release/SHA256SUMS.txt
